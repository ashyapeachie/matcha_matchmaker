<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Matcha Matchmaker</title>

        <link rel="stylesheet" href="css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap" 
            rel="stylesheet">
    </head>

    <body>
        <header>
            <h1>🍵 Matcha Matchmaker</h1>
            <!-- <p>...</p> -->
        </header>

        <nav>
            <a href="#collection">Collection</a>
            <a href="#journal">Diary</a>
        </nav>

        <main>
            <section class="hero">
                <h2>Find Your Perfect Matcha</h2>

                <p>
                    Track your favorite matcha powders, compare brands, and document your daily matcha journey.
                </p>

                <button id="start-btn">
                    Start Exploring 🍵
                </button>
            </section>
            
            <section id="collection">
                <h2>My Matcha Collection 🌿</h2>

                <div class="form-card">
                    <h3>Add a New Matcha</h3>

                    <form id="matcha-form">
                        <label for="brand">Brand Name</label>
                        <input
                            type="text"
                            id="brand"
                            placeholder="Ex: Ippodo"
                            required>

                        <label for="grade">Grade</label>

                        <select id="grade">
                            <option>Ceremonial</option>
                            <option>Culinary</option>
                        </select>

                        <label for="rating">Rating</label>

                        <input
                            type="number"
                            id="rating"
                            min="1"
                            max="5"
                            placeholder="1-5">

                        <label for="price">Price ($)</label>

                        <input
                            type="number"
                            id="price"
                            step="0.01"
                            placeholder="24.99">

                        <label for="notes">Flavor Notes</label>

                        <textarea
                            id="notes"
                            rows="4"
                            placeholder="Creamy, grassy, sweet...">
                        </textarea>

                        <label class="favorite-box">
                            <input type="checkbox" id="favorite">
                            Favorite ❤️
                        </label>

                        <button type="submit">
                            Add Matcha 🍵
                        </button>
                    </form>
                </div>

                <div id="matcha-container">

                </div>    
            </section>

            <section id="journal">
                <h2>Matcha Moments ✨</h2>

                <div class="journal-card">
                    <h3>Today's cup:</h3>
                    <p>Mood: Relaxed</p>
                    <p>Energy: 8/10</p>
                </div>
            </section>
        </main>

         <footer>
            <p>Made with 🍵 by Ashya</p>
        </footer>

        <script src="js/matcha.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
