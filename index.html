<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Matcha Matchmaker</title>

        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>
        <header>
            <h1>🍵 Matcha Matchmaker</h1>
            <p>Discover, compare, rank, and journal your favorite matcha.</p>
        </header>

        <nav>
            <a href="#collection">Collection</a>
            <a href="#journal">Diary</a>
        </nav>

        <main>
            <section id="collection">
                <h2>My Matcha Collection</h2>

                <div id="matcha-container">
                    <div class="matcha-card">
                        <h3>Sample Matcha</h3>
                        <p>Grade: Ceremonial</p>
                        <p>Rating: ⭐⭐⭐⭐⭐</p>
                    </div>
                </div>
            </section>

            <section id="journal">
                <h2>Daily Matcha Diary</h2>

                <div class="journal-card">
                    <p>No entries yet.</p>
                </div>
            </section>
        </main>

        <script src="js/app.js"></script>
    </body>
</html>
